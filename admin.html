<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UTN Tracker - Admin Migración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <main class="container py-4">
      <h1 class="h4 mb-3">Migración users → users-dev</h1>

      <div class="card">
        <div class="card-body">
          <div id="auth-state" class="mb-3 text-muted">Iniciá sesión para continuar.</div>
          <div class="d-flex gap-2 flex-wrap mb-3">
            <button id="btn-signin" type="button" class="btn btn-primary">Iniciar con Google</button>
            <button id="btn-signout" type="button" class="btn btn-outline-secondary d-none">Cerrar sesión</button>
          </div>
          <button id="btn-migrate" type="button" class="btn btn-danger" disabled>Ejecutar migración</button>
          <div id="migration-status" class="mt-3 small text-muted"></div>
        </div>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
      import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
      import { collection, doc, getDocs, getFirestore, writeBatch } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

      const ADMIN_EMAIL = "fscaliseg@gmail.com";
      const MAX_BATCH_SIZE = 400;
      const firebaseConfig = {
        apiKey: "AIzaSyB4n2_ZY0tBjwMzoQqvjjUHlqD0Yu6Dr0A",
        authDomain: "utntracker.firebaseapp.com",
        projectId: "utntracker",
        storageBucket: "utntracker.firebasestorage.app",
        messagingSenderId: "791264678302",
        appId: "1:791264678302:web:e637c2e3b499614683868f",
        measurementId: "G-T4WYQC67SW"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      const db = getFirestore(app);

      const authStateEl = document.getElementById('auth-state');
      const statusEl = document.getElementById('migration-status');
      const btnSignin = document.getElementById('btn-signin');
      const btnSignout = document.getElementById('btn-signout');
      const btnMigrate = document.getElementById('btn-migrate');

      function setStatus(msg) {
        statusEl.textContent = msg || '';
      }

      function toNumOrNull(v) {
        if (v === null || v === undefined || v === '') return null;
        const n = Number.parseFloat(String(v).replace(',', '.'));
        return Number.isFinite(n) ? n : null;
      }

      function detectModel(entry) {
        if (entry && (entry.approvalModel === 'standard' || entry.approvalModel === 'with_lab' || entry.approvalModel === 'three_partials')) {
          return entry.approvalModel;
        }
        return 'standard';
      }

      function partialCountForModel(model) {
        return model === 'three_partials' ? 3 : 2;
      }

      function buildPartials(values, partialCount) {
        const partials = [];
        for (let p = 1; p <= partialCount; p++) {
          const attempts = [];
          for (let a = 1; a <= 3; a++) {
            const grade = toNumOrNull(values[`parcial${p}_${a}`]);
            const date = values[`parcial${p}_${a}_date`] || null;
            if (grade !== null || date) {
              attempts.push({
                date,
                grade,
                attended: grade !== null ? true : null
              });
            }
          }
          partials.push(attempts);
        }
        return partials;
      }

      function buildFinals(values) {
        const finals = [];
        for (let i = 1; i <= 4; i++) {
          const grade = toNumOrNull(values[`final${i}`]);
          const date = values[`final${i}_date`] || null;
          if (grade !== null || date) {
            finals.push({
              date,
              grade,
              attended: grade !== null ? true : null
            });
          }
        }
        return finals;
      }

      function migrateUserData(userData) {
        const source = userData && userData.subjectData && typeof userData.subjectData === 'object' ? userData.subjectData : {};
        const subjects = Object.keys(source).map((subjectId) => {
          const entry = source[subjectId] || {};
          const values = entry.values && typeof entry.values === 'object' ? entry.values : {};
          const model = detectModel(entry);
          const partialCount = partialCountForModel(model);
          return {
            subject_id: subjectId,
            approval_model: model,
            exams: {
              partials: buildPartials(values, partialCount),
              finals: buildFinals(values)
            },
            lab_approved: entry.labApproved === true
          };
        });
        return { subjects };
      }

      async function runMigration() {
        const user = auth.currentUser;
        if (!user || user.email !== ADMIN_EMAIL) return;

        btnMigrate.disabled = true;
        setStatus('Migrando...');
        try {
          const snapshot = await getDocs(collection(db, 'users'));
          let batch = writeBatch(db);
          let pending = 0;
          let total = 0;

          for (const userDoc of snapshot.docs) {
            const migrated = migrateUserData(userDoc.data() || {});
            batch.set(doc(db, 'users-dev', userDoc.id), migrated);
            pending += 1;
            total += 1;
            if (pending >= MAX_BATCH_SIZE) {
              await batch.commit();
              batch = writeBatch(db);
              pending = 0;
            }
          }
          if (pending > 0) await batch.commit();
          setStatus(`Migración finalizada. Usuarios procesados: ${total}.`);
        } catch (e) {
          setStatus(`Error durante la migración: ${(e && e.message) ? e.message : 'desconocido'}.`);
        } finally {
          btnMigrate.disabled = false;
        }
      }

      btnSignin.addEventListener('click', async () => {
        try {
          await signInWithPopup(auth, provider);
        } catch (e) {
          setStatus('No se pudo iniciar sesión.');
        }
      });

      btnSignout.addEventListener('click', async () => {
        try {
          await signOut(auth);
        } catch (e) {
          setStatus('No se pudo cerrar sesión.');
        }
      });

      btnMigrate.addEventListener('click', runMigration);

      onAuthStateChanged(auth, (user) => {
        const isAdmin = !!(user && user.email === ADMIN_EMAIL);
        btnSignin.classList.toggle('d-none', !!user);
        btnSignout.classList.toggle('d-none', !user);
        btnMigrate.disabled = !isAdmin;
        if (!user) {
          authStateEl.textContent = 'Iniciá sesión para continuar.';
          return;
        }
        if (isAdmin) {
          authStateEl.textContent = `Autenticado como ${user.email}. Acceso habilitado.`;
        } else {
          authStateEl.textContent = `Autenticado como ${user.email}. Sin permisos para migrar.`;
        }
      });
    </script>
  </body>
</html>
